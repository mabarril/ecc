# ─────────────────────────────────────────────────────────────────────
# docker-compose.yml — ECC Admin
# Serviços: ecc-db (MySQL 8), ecc-api (Node.js), ecc-web (Nginx/Angular)
# ─────────────────────────────────────────────────────────────────────

services:

  # ── MySQL ────────────────────────────────────────────────────────────
  ecc-db:
    image: mysql:8.0
    container_name: ecc-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306" # exposto para acesso via ferramentas locais (DBeaver, etc.)
    volumes:
      - ecc_mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ecc-network

  # ── API Node.js / Express ────────────────────────────────────────────
  ecc-api:
    build:
      context: ./ecc-admin-backend
      dockerfile: Dockerfile
    container_name: ecc-api
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      PORT: ${PORT}
      NODE_ENV: ${NODE_ENV}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      ecc-db:
        condition: service_healthy
    networks:
      - ecc-network

  # ── Frontend Angular + Nginx ─────────────────────────────────────────
  ecc-web:
    build:
      context: ./ecc-admin-web
      dockerfile: Dockerfile
    container_name: ecc-web
    restart: unless-stopped
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro # certificados SSL montados como read-only
    depends_on:
      - ecc-api
    networks:
      - ecc-network

# ── Volumes ──────────────────────────────────────────────────────────
volumes:
  ecc_mysql_data:
    driver: local

# ── Redes ────────────────────────────────────────────────────────────
networks:
  ecc-network:
    driver: bridge
